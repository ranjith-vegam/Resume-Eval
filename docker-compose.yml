services:
  mongo:
    image: mongo:8
    container_name: resume-eval-mongo
    restart: unless-stopped
    networks:
      - resume_eval_net
    ports:
      - "0.0.0.0:${MONGO_PORT:-27019}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: resume-eval-app
    restart: unless-stopped
    networks:
      - resume_eval_net
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8123}:${PORT:-8000}"
    environment:
      PORT: ${PORT:-8000}
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/?authSource=admin
      MONGO_DB_NAME: ${MONGO_DB_NAME:-resume_eval}

networks:
  resume_eval_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.0.0/24

volumes:
  mongo_data:
    name: resume_eval_mongo_data
